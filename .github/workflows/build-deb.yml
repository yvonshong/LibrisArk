name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0). Defaults to v<tauri version> when empty.'
        required: false
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundle: deb
            artifact_name: ubuntu-22.04-amd64
            ext: deb
          - os: windows-latest
            bundle: nsis
            artifact_name: windows-amd64
            ext: exe
          - os: macos-latest
            bundle: dmg
            artifact_name: macos-arm64
            ext: dmg

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag and version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v$(python3 -c "import json; print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")"
          fi
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v${TAG}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync project version from tag
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import re
          from pathlib import Path

          version = "${{ env.VERSION }}"

          tauri_conf = Path("app/src-tauri/tauri.conf.json")
          data = json.loads(tauri_conf.read_text())
          data["version"] = version
          tauri_conf.write_text(json.dumps(data, indent=2) + "\n")

          cargo = Path("app/src-tauri/Cargo.toml")
          cargo.write_text(
              re.sub(
                  r'^version = ".*"',
                  f'version = "{version}"',
                  cargo.read_text(),
                  count=1,
                  flags=re.M,
              )
          )

          package_json = Path("app/package.json")
          pkg = json.loads(package_json.read_text())
          pkg["version"] = version
          package_json.write_text(json.dumps(pkg, indent=2) + "\n")
          PY

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Node dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        env:
          CI: true
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}

      - name: Rename bundle artifact
        shell: bash
        run: |
          mkdir -p release-assets
          find_bundle() {
            find app/src-tauri/target -type f "$@" 2>/dev/null | head -1
          }
          case "${{ matrix.bundle }}" in
            deb)
              src=$(find_bundle -path '*/bundle/deb/*.deb')
              ;;
            nsis)
              src=$(find_bundle \( -path '*/bundle/nsis/*-setup.exe' -o -path '*/bundle/nsis/*.exe' \))
              ;;
            dmg)
              src=$(find_bundle -path '*/bundle/dmg/*.dmg')
              if [[ -z "$src" ]]; then
                app_bundle=$(find app/src-tauri/target -type d -path '*/bundle/macos/*.app' 2>/dev/null | head -1)
                if [[ -n "$app_bundle" ]]; then
                  dest="release-assets/librisark-${TAG}-${{ matrix.artifact_name }}.zip"
                  ditto -c -k --keepParent "$app_bundle" "$dest"
                  echo "DMG missing; packaged .app as zip: $dest"
                  ls -lh release-assets/
                  exit 0
                fi
              fi
              ;;
          esac
          if [[ -z "$src" || ! -f "$src" ]]; then
            echo "Bundle not found for ${{ matrix.bundle }}"
            find app/src-tauri/target -maxdepth 4 -type d 2>/dev/null | head -50 || true
            find app/src-tauri/target -path '*/bundle/*' 2>/dev/null || true
            exit 1
          fi
          echo "Found bundle: $src"
          dest="release-assets/librisark-${TAG}-${{ matrix.artifact_name }}.${{ matrix.ext }}"
          cp "$src" "$dest"
          echo "PACKAGED=$dest" >> "$GITHUB_ENV"
          ls -lh release-assets/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librisark-${{ env.TAG }}-${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: librisark-*
          merge-multiple: true

      - name: List release files
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
